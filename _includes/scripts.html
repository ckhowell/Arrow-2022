<!-- Navbar Scroll Effect for Hero (MUST load after theme.min.js) -->
<script>
    (function () {
        const navbar = document.querySelector('.navbar-transparent-on-hero');

        if (!navbar) return;

        // Check if we're on a page with a dark hero (jina, hero, hero-diy, etc.)
        const hasDarkHero = document.querySelector('.hero-jina') ||
            document.querySelector('.hero.bg-dark') ||
            document.querySelector('.hero-diy') ||
            document.querySelector('section.vh-80.bg-dark');

        if (!hasDarkHero) return;

        // Force transparent state immediately with full background coverage
        navbar.style.setProperty('background', 'transparent', 'important');
        navbar.style.setProperty('backdrop-filter', 'none', 'important');
        navbar.classList.add('navbar-transparent');
        navbar.classList.remove('navbar-scrolled');

        // Handle scroll
        function handleScroll() {
            if (window.scrollY > 50) {
                navbar.classList.add('navbar-scrolled');
                navbar.classList.remove('navbar-transparent');
                navbar.style.setProperty('background', '#ffffff', 'important');
            } else {
                navbar.classList.remove('navbar-scrolled');
                navbar.classList.add('navbar-transparent');
                navbar.style.setProperty('background', 'transparent', 'important');
            }
        }

        // Run after a small delay to ensure DOM is ready
        setTimeout(function () {
            window.addEventListener('scroll', handleScroll, { passive: true });
            handleScroll();
        }, 100);
    })();
</script>
