    /* Override primary color to #00c4a3 (teal/cyan) */
    :root {
      --si-primary: #028f77;
    }

    .text-primary {
      color: # --si-primary: #028f77 !important;
    }

    .text-gradient-primary {
      background: linear-gradient(90deg, #00c4a3 0%, #00a88a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bg-primary {
      background-color: #00c4a3 !important;
    }

    .btn-primary {
      background-color: #00c4a3 !important;
      border-color: #00c4a3 !important;
    }

    .btn-primary:hover,
    .btn-primary:focus,
    .btn-primary:active {
      background-color: #009d82 !important;
      border-color: #009d82 !important;
    }

    .btn-outline-primary {
      color: #00c4a3 !important;
      border-color: #00c4a3 !important;
    }

    .btn-outline-primary:hover,
    .btn-outline-primary:focus,
    .btn-outline-primary:active {
      background-color: #00c4a3 !important;
      border-color: #00c4a3 !important;
    }

    .border-primary {
      border-color: #00c4a3 !important;
    }

    .shadow-primary {
      box-shadow: 0 0.5rem 1.25rem -0.3125rem rgba(0, 196, 163, 0.5) !important;
    }

    a {
      color: #00c4a3;
    }

    a:hover {
      color: #009d82;
    }

    /* Navbar transparent on dark heroes */
    .navbar-transparent-on-hero {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1030 !important;
      transition: all 0.3s ease;
      width: 100%;
    }

    .navbar-transparent-on-hero .container {
      position: relative;
    }

    /* Transparent state for dark heroes */
    .navbar-transparent-on-hero.navbar-transparent {
      background: transparent !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .navbar-transparent-on-hero.navbar-transparent::before {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent !important;
      z-index: -1;
    }

    .navbar-transparent-on-hero.navbar-transparent .navbar-brand,
    .navbar-transparent-on-hero.navbar-transparent .nav-link {
      color: #ffffff !important;
    }

    .navbar-transparent-on-hero.navbar-transparent .navbar-brand-logo {
      filter: brightness(0) invert(1) !important;
    }

    /* Scrolled state - white background */
    .navbar-transparent-on-hero.navbar-scrolled {
      background: #ffffff !important;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1) !important;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
    }

    .navbar-transparent-on-hero.navbar-scrolled::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #ffffff !important;
      z-index: -1;
    }

    .navbar-transparent-on-hero.navbar-scrolled .navbar-brand,
    .navbar-transparent-on-hero.navbar-scrolled .nav-link {
      color: #192549 !important;
    }

    .navbar-transparent-on-hero.navbar-scrolled .navbar-brand-logo {
      filter: none !important;
    }

    .navbar-transparent-on-hero.navbar-scrolled .offcanvas {
      background: #ffffff !important;
    }

    /* Also apply to any navbar on pages with dark hero sections */
    body:has(.hero-jina) .navbar-sticky,
    body:has(.hero.bg-dark) .navbar-sticky,
    body:has(.hero-diy) .navbar-sticky {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1030 !important;
    }

    /* Ensure hero has space for fixed navbar */
    .hero-jina {
      padding-top: 100px !important;
    }

    /* Navbar phone number visibility */
    .navbar-transparent-on-hero.navbar-transparent .text-nav,
    .navbar-transparent-on-hero.navbar-transparent h6.fs-sm {
      color: #ffffff !important;
    }

    .navbar-transparent-on-hero.navbar-transparent .bx-mobile-alt {
      color: #ffffff !important;
    }

    .navbar-scrolled .text-nav,
    .navbar-scrolled h6.fs-sm {
      color: #192549 !important;
    }

    .navbar-scrolled .bx-mobile-alt {
      color: #00c4a3 !important;
    }

    /* Footer background to match hero */
    .footer.bg-gradient-dark {
      background: linear-gradient(135deg, #0a0f1a 0%, #0f1a2f 50%, #1a2f4f 100%) !important;
    }

    .footer.bg-gradient-dark::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 196, 163, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 196, 163, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      pointer-events: none;
    }

  <!-- Page loading styles -->
  <style>
    .course-img {
      height: 220px;
      object-fit: cover;
      width: 100%;
    }

    .page-loading {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      -webkit-transition: all .4s .2s ease-in-out;
      transition: all .4s .2s ease-in-out;
      background-color: #fff;
      opacity: 0;
      visibility: hidden;
      z-index: 9999;
    }

    .dark-mode .page-loading {
      background-color: #0b0f19;
    }

    .page-loading.active {
      opacity: 1;
      visibility: visible;
    }

    .page-loading-inner {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      text-align: center;
      -webkit-transform: translateY(-50%);
      transform: translateY(-50%);
      -webkit-transition: opacity .2s ease-in-out;
      transition: opacity .2s ease-in-out;
      opacity: 0;
    }

    .page-loading.active>.page-loading-inner {
      opacity: 1;
    }

    .page-loading-inner>span {
      display: block;
      font-size: 1rem;
      font-weight: normal;
      color: #9397ad;
    }

    .dark-mode .page-loading-inner>span {
      color: #fff;
      opacity: .6;
    }

    .page-spinner {
      display: inline-block;
      width: 2.75rem;
      height: 2.75rem;
      margin-bottom: .75rem;
      vertical-align: text-bottom;
      border: .15em solid #b4b7c9;
      border-right-color: transparent;
      border-radius: 50%;
      -webkit-animation: spinner .75s linear infinite;
      animation: spinner .75s linear infinite;
    }

    .dark-mode .page-spinner {
      border-color: rgba(255, 255, 255, .4);
      border-right-color: transparent;
    }

    @-webkit-keyframes spinner {
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    @keyframes spinner {
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- Page loading scripts -->
  <script>
    (function () {
      window.onload = function () {
        const preloader = document.querySelector('.page-loading');
        preloader.classList.remove('active');
        setTimeout(function () {
          preloader.remove();
        }, 1000);
      };
    })();
  </script>
